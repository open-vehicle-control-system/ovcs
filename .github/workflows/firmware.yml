name: Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.app }} · ${{ matrix.role }} · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: vms/firmware
            target: ovcs_base_can_system_rpi4
            vehicle: Ovcs1
            role: vms
          - app: infotainment/firmware
            target: ovcs_base_can_system_rpi5
            vehicle: Ovcs1
            role: infotainment
          - app: bridges/firmware
            target: ovcs_base_can_system_rpi3a
            vehicle: Ovcs1
            role: radio_control
            bridge_firmware_id: radio_control
          # bridges/firmware × rpi4 (role: ros) is intentionally NOT in
          # CI: ros_bridge's mix.exs keeps `emqtt` for the disabled
          # legacy MQTT-plugin path, which transitively pulls in
          # `quicer`. `quicer`'s bundled msquic + openssl hardcode
          # x86_64 build flags (`-m64`), so they don't cross-compile
          # to aarch64-nerves-linux-gnu. The native rmw_zenoh path is
          # what's actually wired into the supervision tree. Re-enable
          # this row once ros_bridge drops emqtt (or quicer learns to
          # cross-compile).
    env:
      MIX_TARGET: ${{ matrix.target }}
      VEHICLE: ${{ matrix.vehicle }}
      BRIDGE_FIRMWARE_ID: ${{ matrix.bridge_firmware_id }}
      # MIX_ENV is deliberately unset at the workflow level. `build.sh`
      # pre-compiles the vehicle for MIX_TARGET=host in MIX_ENV=dev
      # (the firmware's `copy_vehicle_app/1` release step expects
      # `vehicles/<dir>/_build/dev/lib/<dir>/`). The firmware itself
      # builds in dev too — that's what `mix firmware` produces locally
      # when nobody sets MIX_ENV. Keeping CI aligned with `./ovcs build`
      # avoids the `_build/<target>_prod` vs `_build/<target>_dev`
      # path drift.
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-mise

      - name: Install Nerves system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential automake autoconf git squashfs-tools ssh-askpass \
            pkg-config curl unzip libssl-dev libmnl-dev

      - name: Install fwup
        run: |
          # Not in apt — pull the upstream .deb. Same approach as
          # docs/getting_started.md's "Install system-level tools" step.
          fwup_version=1.15.0
          curl -fsSL -o /tmp/fwup.deb \
            "https://github.com/fwup-home/fwup/releases/download/v${fwup_version}/fwup_${fwup_version}_$(dpkg --print-architecture).deb"
          sudo dpkg -i /tmp/fwup.deb
          fwup --version

      - uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.app }}/deps
            ${{ matrix.app }}/_build
            vehicles/${{ matrix.vehicle == 'Ovcs1' && 'ovcs1' || matrix.vehicle }}/deps
            vehicles/${{ matrix.vehicle == 'Ovcs1' && 'ovcs1' || matrix.vehicle }}/_build
            ~/.nerves
          key: nerves-${{ matrix.app }}-${{ matrix.target }}-${{ matrix.role }}-${{ hashFiles(format('{0}/mix.lock', matrix.app)) }}
          restore-keys: |
            nerves-${{ matrix.app }}-${{ matrix.target }}-${{ matrix.role }}-

      - name: Build firmware
        working-directory: ${{ matrix.app }}
        # `mise exec --` activates the full mise.toml toolchain in the
        # subprocess, so build.sh's children (in particular the
        # `flutter` invocation by `nerves_flutter_support` during the
        # infotainment release step) find every pinned runtime on PATH.
        run: mise exec -- ./build.sh

      - name: Locate firmware artifact
        id: locate
        working-directory: ${{ matrix.app }}
        run: |
          fw=$(ls _build/${{ matrix.target }}_dev/nerves/images/*.fw | head -n1)
          echo "path=$fw" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$fw")" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v5
        with:
          name: firmware-${{ matrix.role }}-${{ matrix.target }}
          path: ${{ matrix.app }}/${{ steps.locate.outputs.path }}
          if-no-files-found: error
          retention-days: 30
