# ROS 2 Jazzy stack for the on-vehicle Pi. Uses `rmw_zenoh_cpp` so
# every ROS node joins the same Zenoh fabric the Elixir bridges
# already speak to (router at $ZENOH_ENDPOINT_IP). No DDS, no
# multicast — the container peers with the router over TCP.
#
# Usage (on the Pi or any dev machine):
#   ZENOH_ENDPOINT_IP=192.168.10.95 docker compose up -d
#
# To get a shell with the ROS env sourced:
#   docker compose exec ros2 bash
#
# Smoke test against the bridge's heartbeat:
#   docker compose exec ros2 bash -lc \
#     'ros2 topic echo /ovcs_heartbeat std_msgs/msg/String'

# Shared YAML anchor for every service that runs the single ROS 2
# image (`ros2`, `foxglove_bridge`, `joy`). Each service composes
# this in via `<<: *ros2-base`, then layers on its own command /
# env / volumes / device wiring. Only the `ros2` service builds the
# image — the others reference it by tag so we don't rebuild three
# times.
x-ros2-base: &ros2-base
  image: ovcs/ros2:jazzy
  restart: unless-stopped
  depends_on:
    - zenohd
  # host networking sidesteps the Zenoh peer's port juggling and
  # makes mDNS / local discovery work the same as a bare-metal install.
  network_mode: host
  environment: &ros2-env
    RMW_IMPLEMENTATION: rmw_zenoh_cpp
    ZENOH_SESSION_CONFIG_URI: /tmp/zenoh-session.json5
    # Surfaced for any tooling that reads it; the actual peer
    # endpoint lives in session.json5 (templated by the entrypoint).
    ZENOH_ENDPOINT_IP: ${ZENOH_ENDPOINT_IP:-127.0.0.1}
  volumes:
    - ./zenoh/session.json5.template:/etc/zenoh/session.json5.template:ro

services:
  zenohd:
    # This host *is* the router for the OVCS fabric. The Elixir
    # bridges (Nerves devices) connect to it at
    # tcp/<this-host-LAN-ip>:7447; the ROS services below connect to
    # it at tcp/127.0.0.1:7447 via host networking.
    image: eclipse/zenoh:1.9.0
    container_name: ovcs-zenohd
    restart: unless-stopped
    network_mode: host
    command: ["-l", "tcp/0.0.0.0:7447"]

  ros2:
    <<: *ros2-base
    container_name: ovcs-ros2
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./zenoh/session.json5.template:/etc/zenoh/session.json5.template:ro
      # Drop ROS 2 packages you write here; the entrypoint sources
      # /opt/ros/jazzy + this overlay before running the container CMD.
      - ./workspace:/workspace
    # Default image CMD idles. Override via
    # `docker compose run --rm ros2 ros2 topic list` to one-shot.

  foxglove_bridge:
    <<: *ros2-base
    container_name: ovcs-foxglove-bridge
    environment:
      <<: *ros2-env
      FOXGLOVE_BRIDGE_PORT: ${FOXGLOVE_BRIDGE_PORT:-8765}
    command: ["foxglove_bridge"]

  joy:
    # Reads a USB game controller (Xbox / generic HID) from
    # /dev/input/${JOY_DEV} on the host and republishes it as
    # sensor_msgs/Joy on /joy. `RosBridge.JoyInterpreter` subscribes
    # to the same topic via rmw_zenoh's `0/joy/**` keyexpr, so the
    # joystick drives steering/throttle on the OVCS CAN bus end-to-end.
    #
    # Plug the controller in before `docker compose up joy`; the
    # cgroup rule + /dev/input bind-mount let new device nodes show
    # up live (no restart needed if you hot-plug).
    <<: *ros2-base
    container_name: ovcs-joy
    environment:
      <<: *ros2-env
      # joy_linux parameters — override per host if your controller
      # is something other than js0.
      JOY_DEV: ${JOY_DEV:-/dev/input/js0}
      JOY_DEADZONE: ${JOY_DEADZONE:-0.05}
      JOY_AUTOREPEAT_RATE: ${JOY_AUTOREPEAT_RATE:-20.0}
    volumes:
      - ./zenoh/session.json5.template:/etc/zenoh/session.json5.template:ro
      # Bind-mount the whole /dev/input tree (not a single `devices:`
      # entry) so a hot-plugged controller appears in the container
      # without restarting it. The cgroup rule below grants read/write
      # to any char device with major 13 — the Linux input subsystem.
      - /dev/input:/dev/input
    device_cgroup_rules:
      - 'c 13:* rmw'
    command: ["joy"]
