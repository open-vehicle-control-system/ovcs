[tools]
# Bumped to OTP 28 to match the perception Pi 5 system (rebased on
# upstream nerves_system_rpi5 v2.0.x ships OTP 28 + Elixir 1.19).
# Mix refuses to cross-compile across major OTP versions, so the host
# pin has to track the highest-version target. ovcs_base_can_system_
# {rpi3a,rpi4} still ship OTP 27 on flashed devices; their firmware
# rebuilds need their system forks bumped to nerves_system_br ~> 1.33
# (separate work, tracked alongside the perception bridge effort).
erlang  = "28.4.1"
elixir  = "1.19.5-otp-28"
node    = "24"
ruby    = "3.3"
rust    = "1.90"
flutter = "3.32.8"
python  = "3.12"
uv      = "latest"
"pipx:platformio" = "latest"

[env]
# Work around a ruby-build 20260412 bug on Ubuntu 26.04 where the Rekor
# attestation public key cannot be parsed. Safe to disable — we still verify
# the download SHA.
RUBY_BUILD_ATTESTATION_VERIFY = "false"

# Example runtime env; uncomment and adjust as needed.
# VEHICLE = "Ovcs1"
# CAN_NETWORK_MAPPINGS = "ovcs:can0,leaf_drive:vcan1,polo_drive:vcan2,orion_bms:vcan3,misc:vcan4"

[settings]
# Required to opt into the [hooks] block below.
experimental = true

[hooks]
# Runs automatically after `mise install`, so the Mix archive setup stays in
# lockstep with whichever Elixir version mise has just put in place.
postinstall = "mise run bootstrap && mise run libraries"

[tasks.bootstrap]
description = "One-time Elixir + Nerves setup (hex, rebar, nerves_bootstrap archive)"
run = """
mix local.hex --force
mix local.rebar --force
mix archive.install hex nerves_bootstrap --force
"""

# External libraries live in their own repos and are sideloaded into
# `libraries/` (see libraries/.gitignore). This task clones any that
# are missing; existing clones are left alone so you can pull/edit
# them without the task stomping.
[tasks.libraries]
description = "Clone external libraries (cantastic, express_lrs, msp_osd, ovcs_control) into libraries/"
run = """
set -e
for lib in cantastic express_lrs msp_osd ovcs_control; do
  if [ ! -d "libraries/$lib/.git" ]; then
    echo "→ cloning $lib"
    git clone "https://github.com/open-vehicle-control-system/$lib.git" "libraries/$lib"
  else
    echo "✓ $lib already cloned"
  fi
done
"""

[tasks.cli]
description = "Build the ovcs CLI (Rust release binary → cli/ovcs)"
run = "cd cli && cargo build --release && strip --strip-all target/release/ovcs && cp target/release/ovcs ovcs && chmod +x ovcs"
