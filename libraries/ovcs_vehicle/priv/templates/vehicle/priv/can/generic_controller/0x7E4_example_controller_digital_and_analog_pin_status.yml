---
# Example generic_controller status frame — the controller emits this
# on 0x7X4 to report the current state of its digital and analog
# input pins. Drop this file (and its references) if your controller
# has no inputs to report.
name: example_controller_digital_and_analog_pin_status
id: 0x7E4
frequency: 10
signals: import!:@ovcs_can:can/components/ovcs/generic_controller/0x7X4_digital_and_analog_pin_status_signals.yml
