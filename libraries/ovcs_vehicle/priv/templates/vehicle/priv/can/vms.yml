---
# VMS-side CAN topology.
#
# The `ovcs` network below is the one bus every OVCS vehicle needs:
# it carries VMS ↔ infotainment messages and VMS ↔ generic_controller
# traffic. The example_controller frames demonstrate the standard
# 0x7X1 (alive) / 0x7X2 (digital pin request) / 0x7X4 (pin status)
# pattern — rename and duplicate them per physical controller.
#
# To add hardware-specific buses (drivetrain inverter, BMS, brake
# booster, …) declare extra networks at the same indent level as
# `ovcs`, e.g.:
#
#   drivetrain:
#     bitrate: 500000
#     emitted_frames: [...]
#     received_frames: [...]
#
# See vehicles/ovcs1/priv/can/vms.yml for a fully populated example.
can_networks:
  ovcs:
    bitrate: 1000000
    emitted_frames:
      - import!:@ovcs_can:can/components/ovcs/0x1A0_vms_status.yml
      - import!:@ovcs_can:can/components/ovcs/0x700_controller_configuration.yml
      - import!:@ovcs_can:can/components/ovcs/0x1AA_vms_command.yml
      - import!:generic_controller/0x7E2_example_controller_digital_pin_request.yml
    received_frames:
      - import!:@ovcs_can:can/components/ovcs/0x201_infotainment_status.yml
      - import!:generic_controller/0x7E1_example_controller_alive.yml
      - import!:generic_controller/0x7E4_example_controller_digital_and_analog_pin_status.yml
