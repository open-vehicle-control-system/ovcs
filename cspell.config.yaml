# Empty — populate if you want to mark specific strings as
# always-misspelled across the repo.
flagWords: []

# Patterns to skip: things that look like words but aren't.
ignoreRegExpList:
  # RIHS01 ROS 2 type hashes — `RIHS01_<64-hex>`.
  - "RIHS01_[A-Fa-f0-9]{64,}"
  # Long hex / base64 blobs (tokens, keys, hashes).
  - "\\b[A-Fa-f0-9]{16,}\\b"
  - "\\b[A-Za-z0-9+/]{24,}={0,2}\\b"
  # CSS hex colours and Elixir 0x literals.
  - "#[0-9A-Fa-f]{3,8}\\b"
  - "0x[0-9A-Fa-f]+"
  # URLs and env-var references — already typical false positives.
  - "https?://\\S+"
  - "\\$\\{?[A-Z_][A-Z0-9_]*\\}?"
  # ROS DDS-mangled type names like `std_msgs::msg::dds_::String_`.
  - "\\b[a-z_]+::msg::dds_::[A-Za-z0-9_]+\\b"
  # Generic C++-style namespaced identifiers.
  - "\\b[A-Za-z_][A-Za-z0-9_]*(::[A-Za-z_][A-Za-z0-9_]*)+\\b"

# Skip whole trees that aren't human-edited.
ignorePaths:
  - "**/_build/**"
  - "**/deps/**"
  - "**/node_modules/**"
  - "**/.elixir_ls/**"
  - "**/priv/static/**"
  - "**/cli/target/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/*.lock"
  - "**/mix.lock"
  - "**/package-lock.json"
  - "**/pnpm-lock.yaml"
  - "**/Cargo.lock"
  - "**/.git/**"
  - "**/*.svg"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.pem"
  - "**/*.crt"
  - "**/*.key"
