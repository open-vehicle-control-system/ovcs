# Workspace config for the `streetsidesoftware.code-spell-checker`
# VS Code extension (recommended in .vscode/extensions.json).
#
# Add new domain vocabulary here rather than per-file `cspell:disable`
# pragmas so the project dictionary stays diffable in PRs.
